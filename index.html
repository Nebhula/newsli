function ordenarPorScore(items) {
  return [...items].sort((a, b) => b.score - a.score).map((item, index) => ({ ...item, posicion: index + 1 }));
}

let favoritos = JSON.parse(localStorage.getItem('favoritosGlobal')) || [];

function actualizarContador() { document.getElementById('favCounter').textContent = favoritos.length; }
function guardarFavoritos() { localStorage.setItem('favoritosGlobal', JSON.stringify(favoritos)); actualizarContador(); }
function esFavorito(id) { return favoritos.some(f => f.id === id); }

function toggleFavorito(item, btn) {
  const idx = favoritos.findIndex(f => f.id === item.id);
  if (idx === -1) { favoritos.push(item); showToast(item.titulo + ' guardado'); if (btn) btn.classList.add('fav-active'); }
  else { favoritos.splice(idx, 1); showToast(item.titulo + ' eliminado'); if (btn) btn.classList.remove('fav-active'); }
  guardarFavoritos();
}

function compartirItem(item) {
  if (navigator.share) {
    navigator.share({ title: item.titulo, text: item.descripcion, url: window.location.href });
  } else {
    navigator.clipboard.writeText(item.titulo + ' - ' + item.descripcion);
    showToast('Enlace copiado al portapapeles');
  }
}

function getItemById(itemId, categoria) {
  if (!categoria || categoria === 'unknown') return null;
  if (!rankingsData[categoria]) return null;
  for (const listaId in rankingsData[categoria].items) {
    const item = rankingsData[categoria].items[listaId].find(i => i.id === itemId);
    if (item) return item;
  }
  return null;
}

function abrirModal(itemId, categoria) {
  const item = getItemById(itemId, categoria);
  if (!item) return;
  abrirModalDesdeFavorito(item);
}

function cerrarModal() {
  const modal = document.getElementById('detailModal');
  modal.classList.remove('active');
  document.body.style.overflow = 'auto';
}

function toggleFavoritoModal(itemId, categoria) {
  const item = getItemById(itemId, categoria);
  if (item) {
    toggleFavorito(item);
    abrirModal(itemId, categoria);
  }
}

function showToast(msg) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function cambiarCategoria(cat) {
  document.querySelectorAll('.tab-btn-wrap').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  
  document.querySelectorAll('.tab-panel-wrap').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + cat).classList.add('active');
  
  renderListas(cat);
}

function renderListas(categoria) {
  const data = rankingsData[categoria];
  const container = document.getElementById('listas-' + categoria);
  
  container.innerHTML = data.listas.map(lista => `
    <div class="lista-card" onclick="verLista('${categoria}', '${lista.id}')">
      <img class="lista-imagen" src="${lista.imagen}" alt="${lista.titulo}">
      <div class="lista-contenido">
        <div class="lista-titulo">${lista.titulo}</div>
        <div class="lista-desc">${lista.descripcion}</div>
        <div class="lista-meta">
          <span><i class="fas fa-list"></i> ${lista.items} items</span>
        </div>
      </div>
    </div>
  `).join('');
}

function verLista(categoria, listaId) {
  const data = rankingsData[categoria];
  const lista = data.listas.find(l => l.id === listaId);
  const items = ordenarPorScore(data.items[listaId]);
  
  document.querySelector('#panel-' + categoria + ' .vista-listas').style.display = 'none';
  document.querySelector('#panel-' + categoria + ' .vista-items').style.display = 'block';
  document.getElementById('titulo-' + categoria).textContent = lista.titulo;
  
  renderItems(categoria, items);
}

function volver(categoria) {
  document.querySelector('#panel-' + categoria + ' .vista-listas').style.display = 'block';
  document.querySelector('#panel-' + categoria + ' .vista-items').style.display = 'none';
}

function renderItems(categoria, items) {
  const container = document.getElementById('items-' + categoria);
  
  container.innerHTML = items.map(item => {
    const posClass = item.posicion === 1 ? 'top1' : item.posicion === 2 ? 'top2' : item.posicion === 3 ? 'top3' : '';
    const scoreClass = item.score >= 0 ? 'positivo' : 'negativo';
    const scorePercent = Math.min(Math.abs(item.score), 100);
    
    return `
      <div class="item-card" data-item-id="${item.id}" data-categoria="${categoria}">
        <div class="item-imagen">
          <img src="${item.imagen}" alt="${item.titulo}" style="width:100%;height:100%;object-fit:cover;">
          <div class="item-posicion ${posClass}">${item.posicion}</div>
          <div class="item-image-buttons">
            <button class="img-btn ${esFavorito(item.id) ? 'fav-active' : ''}" onclick="event.stopPropagation(); toggleFavoritoById('${item.id}', '${categoria}', this)">
              <i class="${esFavorito(item.id) ? 'fas' : 'far'} fa-heart"></i>
            </button>
            <button class="img-btn share-btn" onclick="event.stopPropagation(); compartirItemById('${item.id}', '${categoria}')">
              <i class="fas fa-share"></i>
            </button>
          </div>
        </div>
        <div class="item-contenido">
          <div class="item-titulo" onclick="abrirModal('${item.id}', '${categoria}')">${item.titulo}</div>
          <div class="item-desc">${item.descripcion}</div>
          <div class="item-score-container">
            <span class="item-score-label"><i class="fas fa-star"></i> Puntuación</span>
            <span class="item-score-value ${scoreClass}">${item.score}</span>
            <span class="item-score-max">/100</span>
            <div class="item-score-bar">
              <div class="item-score-bar-fill ${scoreClass}" style="width: ${scorePercent}%"></div>
            </div>
          </div>
          <div class="item-actions">
            <button class="btn-eye" onclick="event.stopPropagation(); abrirModal('${item.id}', '${categoria}')">
              <i class="fas fa-eye"></i> Ver ficha
            </button>
          </div>
        </div>
      </div>
    `;
  }).join('');
  
  container.querySelectorAll('.item-card').forEach(card => {
    card.addEventListener('click', function(e) {
      if (!e.target.closest('button') && !e.target.closest('.item-titulo')) {
        const itemId = this.dataset.itemId;
        const categoria = this.dataset.categoria;
        abrirModal(itemId, categoria);
      }
    });
  });
}

function toggleFavoritoById(itemId, categoria, btn) {
  const item = getItemById(itemId, categoria);
  if (item) toggleFavorito(item, btn);
}

function compartirItemById(itemId, categoria) {
  const item = getItemById(itemId, categoria);
  if (item) compartirItem(item);
}

// === FUNCION ARREGLADA: AHORA USA abrirModalDesdeFavorito CON EL ITEM COMPLETO ===
function renderFavoritos() {
  const container = document.getElementById('favoritos-container');
  
  if (favoritos.length === 0) {
    container.innerHTML = '<div class="empty-state"><i class="fas fa-heart"></i><p>No tienes favoritos guardados</p></div>';
    return;
  }
  
  container.innerHTML = '<div class="items-grid">' + favoritos.map((item, index) => {
    const scoreClass = item.score >= 0 ? 'positivo' : 'negativo';
    const scorePercent = Math.min(Math.abs(item.score), 100);
    const categoria = item.categoria || 'unknown';
    
    return `
      <div class="item-card" data-fav-index="${index}">
        <div class="item-imagen">
          <img src="${item.imagen}" alt="${item.titulo}" style="width:100%;height:100%;object-fit:cover;">
          <div class="item-image-buttons">
            <button class="img-btn fav-active" onclick="event.stopPropagation(); toggleFavoritoByIndex(${index}, this)">
              <i class="fas fa-heart"></i>
            </button>
          </div>
        </div>
        <div class="item-contenido">
          <div class="item-titulo" onclick="abrirFavoritoPorIndex(${index})">${item.titulo}</div>
          <div class="item-desc">${item.descripcion}</div>
          <div class="item-score-container">
            <span class="item-score-label"><i class="fas fa-star"></i> Puntuación</span>
            <span class="item-score-value ${scoreClass}">${item.score}</span>
            <span class="item-score-max">/100</span>
            <div class="item-score-bar">
              <div class="item-score-bar-fill ${scoreClass}" style="width: ${scorePercent}%"></div>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('') + '</div>';
  
  container.querySelectorAll('.item-card').forEach(card => {
    card.addEventListener('click', function(e) {
      if (!e.target.closest('button') && !e.target.closest('.item-titulo')) {
        const index = this.dataset.favIndex;
        abrirFavoritoPorIndex(index);
      }
    });
  });
}

// === NUEVAS FUNCIONES PARA FAVORITOS ===
function abrirFavoritoPorIndex(index) {
  const item = favoritos[index];
  if (item) {
    abrirModalDesdeFavorito(item);
  }
}

function toggleFavoritoByIndex(index, btn) {
  const item = favoritos[index];
  if (item) {
    toggleFavorito(item, btn);
    renderFavoritos();
  }
}

function mostrarFavoritos() {
  document.querySelectorAll('.tab-btn-wrap').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel-wrap').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-favoritos').classList.add('active');
  renderFavoritos();
}

document.addEventListener('DOMContentLoaded', function() {
  actualizarContador();
  renderListas('cine');
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') cerrarModal();
});

document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) cerrarModal();
});
</script>
