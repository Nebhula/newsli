<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0c15">
  <title>Nebhula Rankings</title>
  <link href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css' rel='stylesheet'>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0c15; font-family: Arial, sans-serif; overflow-x: hidden; }
    
    .app-container { max-width: 1400px; margin: 0 auto; padding: 10px 15px 100px; }
    
    .tabs-nav-wrap { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding: 8px 0; position: sticky; top: 0; background: #0a0c15; z-index: 100; }
    .tab-btn-wrap { background: #11131f; border: 1px solid #1e2a3a; border-radius: 40px; padding: 10px 20px; cursor: pointer; font-weight: 600; color: #8a8f9e; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .tab-btn-wrap.active { background: #e91e63; color: #fff; border-color: #e91e63; }
    
    .tab-panel-wrap { display: none; }
    .tab-panel-wrap.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    /* === FILTROS COMPACTOS === */
    .filtros-container { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .filtros-container::-webkit-scrollbar { display: none; }
    .filtro-select { background: #11131f; border: 1px solid #1e2a3a; border-radius: 20px; padding: 8px 12px; color: #fff; font-size: 11px; cursor: pointer; outline: none; min-width: 80px; white-space: nowrap; }
    .filtro-select:focus { border-color: #e91e63; }
    
    .listas-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    @media (max-width: 900px) { .listas-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .listas-grid { grid-template-columns: 1fr; } }
    
    .lista-card { background: #11131f; border-radius: 16px; overflow: hidden; border: 1px solid #1e2a3a; cursor: pointer; transition: all 0.3s; }
    .lista-card:hover { transform: translateY(-5px); border-color: #e91e63; }
    .lista-imagen { width: 100%; height: 160px; object-fit: cover; }
    .lista-contenido { padding: 15px; }
    .lista-titulo { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .lista-desc { font-size: 13px; color: #8a8f9e; line-height: 1.4; margin-bottom: 10px; }
    .lista-meta { display: flex; gap: 15px; font-size: 12px; color: #5a5f6e; padding-top: 10px; border-top: 1px solid #1e2a3a; flex-wrap: wrap; }
    
    .items-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; margin-bottom: 40px; }
    @media (max-width: 900px) { .items-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .items-grid { grid-template-columns: 1fr; } }
    
    .item-card { background: #11131f; border-radius: 16px; overflow: hidden; border: 1px solid #1e2a3a; transition: all 0.3s; position: relative; cursor: pointer; }
    .item-card:hover { transform: translateY(-3px); border-color: #e91e63; }
    
    .item-imagen { width: 100%; height: 260px; object-fit: cover; position: relative; background: #1a1f2e; }
    .item-posicion { position: absolute; top: 10px; left: 10px; background: #e91e63; color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 18px; z-index: 5; }
    .item-posicion.top1 { background: linear-gradient(135deg, #ffd700, #ffb347); width: 45px; height: 45px; font-size: 22px; }
    .item-posicion.top2 { background: linear-gradient(135deg, #c0c0c0, #a8a8a8); }
    .item-posicion.top3 { background: linear-gradient(135deg, #cd7f32, #b87333); }
    
    .item-image-buttons { position: absolute; top: 10px; right: 10px; display: flex; gap: 8px; z-index: 10; }
    .img-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.2s; }
    .img-btn:hover { transform: scale(1.1); background: rgba(0,0,0,0.9); }
    .img-btn.fav-active { background: #e91e63; color: #fff; }
    .img-btn.share-btn:hover { background: #60a5fa; }
    
    .item-contenido { padding: 15px; }
    .item-titulo { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 8px; cursor: pointer; }
    .item-titulo:hover { color: #e91e63; }
    .item-desc { font-size: 13px; color: #8a8f9e; line-height: 1.4; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    
    .item-score-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; background: #1e2a3a; padding: 8px 12px; border-radius: 30px; }
    .item-score-label { font-size: 11px; color: #8a8f9e; display: flex; align-items: center; gap: 5px; }
    .item-score-value { font-size: 20px; font-weight: 800; }
    .item-score-value.positivo { color: #22c55e; }
    .item-score-value.negativo { color: #ef4444; }
    .item-score-max { font-size: 12px; color: #5a5f6e; }
    .item-score-bar { flex: 1; height: 4px; background: #2a3a4a; border-radius: 2px; margin-left: 12px; overflow: hidden; }
    .item-score-bar-fill { height: 100%; border-radius: 2px; }
    .item-score-bar-fill.positivo { background: linear-gradient(90deg, #22c55e, #4ade80); }
    .item-score-bar-fill.negativo { background: linear-gradient(90deg, #ef4444, #f87171); }
    
    .item-actions { display: flex; gap: 8px; align-items: center; margin-top: 5px; }
    .btn-eye { background: #1e2a3a; border: none; padding: 8px 16px; border-radius: 30px; color: #60a5fa; cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 8px; font-weight: 600; transition: all 0.2s; width: 100%; justify-content: center; }
    .btn-eye:hover { background: #60a5fa; color: #fff; }
    
    .btn-volver { background: #1e2a3a; border: none; padding: 10px 20px; border-radius: 30px; color: #fff; cursor: pointer; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px; }
    .btn-volver:hover { background: #e91e63; }
    
    /* === BOTTOM NAV BAR === */
    .bottom-nav-bar { 
      position: fixed !important; 
      bottom: 0 !important; 
      left: 0 !important; 
      right: 0 !important; 
      background: #0a0c15 !important; 
      border-top: 1px solid #1e2a3a !important; 
      z-index: 1000 !important;
      padding: 10px 0 !important;
    }
    
    .nav-carousel {
      display: flex !important;
      gap: 15px !important;
      overflow-x: auto !important;
      overflow-y: hidden !important;
      -webkit-overflow-scrolling: touch !important;
      scrollbar-width: none !important;
      -ms-overflow-style: none !important;
      padding: 0 15px !important;
      scroll-behavior: smooth !important;
    }
    
    .nav-carousel::-webkit-scrollbar { display: none !important; }
    
    .nav-item {
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 5px !important;
      padding: 8px 15px !important;
      background: none !important;
      border: none !important;
      color: #8a8f9e !important;
      cursor: pointer !important;
      min-width: 70px !important;
      transition: all 0.2s !important;
      flex-shrink: 0 !important;
      position: relative !important;
    }
    
    .nav-item:hover { color: #e91e63 !important; transform: translateY(-2px) !important; }
    .nav-item.active { color: #e91e63 !important; }
    .nav-item i { font-size: 22px !important; }
    .nav-item span { font-size: 11px !important; font-weight: 600 !important; white-space: nowrap !important; }
    
    /* === CONTADOR DE FAVORITOS === */
    .nav-badge {
      position: absolute !important;
      top: 0px !important;
      right: 10px !important;
      background: #e91e63 !important;
      color: #fff !important;
      font-size: 10px !important;
      font-weight: 700 !important;
      padding: 2px 6px !important;
      border-radius: 10px !important;
      min-width: 18px !important;
      text-align: center !important;
      line-height: 1 !important;
    }
    
    /* === FAVORITOS POR CATEGORÍAS === */
    .fav-category-section {
      margin-bottom: 30px !important;
    }
    
    .fav-category-title {
      font-size: 18px !important;
      font-weight: 700 !important;
      color: #e91e63 !important;
      margin-bottom: 15px !important;
      padding-bottom: 10px !important;
      border-bottom: 2px solid #1e2a3a !important;
      display: flex !important;
      align-items: center !important;
      gap: 10px !important;
    }
    
    .fav-category-title i {
      font-size: 20px !important;
    }
    
    .toast-container { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 10000; width: 90%; max-width: 300px; }
    .toast { background: #1e293b; color: #fff; padding: 10px 15px; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid #e91e63; font-size: 13px; }
    
    .footer-principal { text-align: center; padding: 30px 10px; background: #0a0c15; border-top: 1px solid #1e2a3a; margin-top: 20px; }
    .footer-logo img { max-width: 150px; }
    .footer-copy { font-size: 11px; color: #5a5f6e; margin-top: 10px; }
    
    .empty-state { text-align: center; padding: 60px 20px; color: #8a8f9e; }
    .empty-state i { font-size: 50px; margin-bottom: 15px; color: #e91e63; }
    
    .modal-full { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0c15; z-index: 9999; overflow-y: auto; }
    .modal-full.active { display: block; }
    .modal-container { max-width: 900px; margin: 20px auto; padding: 20px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 25px; background: #11131f; border-bottom: 1px solid #1e2a3a; position: sticky; top: 0; }
    .modal-title { font-size: 24px; font-weight: 800; color: #e91e63; }
    .btn-close-modal { background: #1e2a3a; border: none; width: 40px; height: 40px; border-radius: 50%; color: #fff; cursor: pointer; font-size: 18px; }
    .btn-close-modal:hover { background: #ef4444; }
    
    .modal-body { background: #0a0c15; }
    .modal-item-header { padding: 25px; border-bottom: 1px solid #1e2a3a; }
    .modal-item-titulo { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 15px; }
    .modal-item-score { display: flex; align-items: center; gap: 15px; background: #1e2a3a; padding: 8px 16px; border-radius: 40px; display: inline-flex; }
    .modal-score-number { font-size: 24px; font-weight: 800; }
    .modal-score-number.positivo { color: #22c55e; }
    .modal-score-label { color: #8a8f9e; }
    
    .modal-info-grid { display: flex; flex-direction: column; }
    .modal-info-row { display: flex; padding: 12px 25px; border-bottom: 1px solid #1e2a3a; }
    .modal-info-label { width: 130px; font-weight: 600; color: #e91e63; }
    .modal-info-value { flex: 1; color: #cbd5e1; }
    
    .modal-review-section { padding: 25px; }
    .modal-review-section h3 { color: #e91e63; margin-bottom: 15px; font-size: 18px; }
    .modal-review-text { color: #cbd5e1; line-height: 1.7; font-size: 15px; }
    
    .modal-actions { display: flex; gap: 15px; padding: 20px 25px; border-top: 1px solid #1e2a3a; background: #0a0c15; }
    .modal-btn { padding: 12px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; border: none; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; }
    .modal-btn-buy { background: #ff9800; color: #fff; }
    .modal-btn-buy:hover { background: #f57c00; }
    .modal-btn-fav { background: #1e2a3a; color: #fff; }
    .modal-btn-fav:hover { background: #e91e63; }
    .modal-btn-fav.active { background: #e91e63; }
    .modal-btn-close { background: #1e2a3a; color: #8a8f9e; }
    .modal-btn-close:hover { background: #ef4444; color: #fff; }
    
    /* === RESPONSIVE === */
    @media (max-width: 600px) {
      .modal-info-row { flex-direction: column; gap: 5px; }
      .modal-info-label { width: 100%; }
      .modal-actions { flex-wrap: wrap; }
      .modal-btn { flex: 1; justify-content: center; }
      .item-imagen { height: 200px; }
      
      /* FILTROS EN UNA LÍNEA EN MÓVIL */
      .filtros-container { 
        flex-direction: row !important; 
        flex-wrap: nowrap !important;
        overflow-x: auto !important;
        padding-bottom: 5px !important;
      }
      .filtro-select { 
        width: auto !important; 
        min-width: 75px !important;
        font-size: 10px !important;
        padding: 6px 10px !important;
      }
    }
  </style>
</head>
<body>

<div class="app-container">
  <div class="tabs-nav-wrap">
    <button class="tab-btn-wrap active" onclick="cambiarCategoria('cine')"><i class="fas fa-film"></i> CINE</button>

          <option value="todos">Año</option>
          <option value="2026">2026</option>
          <option value="2025">2025</option>

    <div class="vista-items" style="display:none;">

      <div class="items-grid" id="items-libros"></div>

  </div>
  
  <div id="panel-games" class="tab-panel-wrap">

  <div id="panel-tecnologia" class="tab-panel-wrap">

<div id="detailModal" class="modal-full">
  <div class="modal-container">
    <div class="modal-header">
      <h2 class="modal-title"><i class="fas fa-info-circle"></i> Ficha completa</h2>

let favoritos = JSON.parse(localStorage.getItem('favoritosGlobal')) || [];
let listasGlobalesPorCategoria = {};
let categoriaActualGlobal = 'cine';

  cine: 'fa-film',
  libros: 'fa-book',
  games: 'fa-gamepad',
  tecnologia: 'fa-laptop',
  deportes: 'fa-futbol',
  terror: 'fa-ghost'
};

const categoriaNombres = {
  cine: '🎬 Cine',
  libros: '📚 Libros',
  games: '🎮 Videojuegos',
  tecnologia: '💻 Tecnología',
  deportes: '⚽ Deportes',
  terror: '👻 Terror'
};

function actualizarContador() {
  const count = favoritos.length;
  const badge = document.getElementById('navBadge');
  
  if (badge) {
    badge.textContent = count;
    if (count > 0) {
      badge.style.display = 'block';
    } else {
      badge.style.display = 'none';
    }
  }
}

function guardarFavoritos() { 
  localStorage.setItem('favoritosGlobal', JSON.stringify(favoritos)); 
  actualizarContador(); 
}

function esFavorito(id) { 
  return favoritos.some(f => f.id === id); 
}

function toggleFavorito(item, btn, categoria) {
  const idx = favoritos.findIndex(f => f.id === item.id);
  if (idx === -1) { 
    const itemConCategoria = { ...item, categoria: categoria };
    favoritos.push(itemConCategoria); 
    showToast(item.titulo + ' guardado'); 
    if (btn) btn.classList.add('fav-active'); 
  } else { 
    favoritos.splice(idx, 1); 
    showToast(item.titulo + ' eliminado'); 
    if (btn) btn.classList.remove('fav-active'); 
  }
  guardarFavoritos();
}

function compartirItem(item) {
  if (navigator.share) {
    navigator.share({ title: item.titulo, text: item.descripcion, url: window.location.href });
  } else {
    navigator.clipboard.writeText(item.titulo + ' - ' + item.descripcion);
    showToast('Enlace copiado');
  }
}

function getItemById(itemId, categoria) {
  if (!categoria || categoria === 'unknown') return null;
  if (!rankingsData[categoria]) return null;
  for (const listaId in rankingsData[categoria].items) {
    const item = rankingsData[categoria].items[listaId].find(i => i.id === itemId);
    if (item) return item;
  }
  return null;
}

function abrirModal(itemId, categoria) {
  const item = getItemById(itemId, categoria);
  if (!item) return;
  abrirModalDesdeFavorito(item);
}

function cerrarModal() {
  const modal = document.getElementById('detailModal');
  modal.classList.remove('active');
  document.body.style.overflow = 'auto';
}

function toggleFavoritoModal(itemId, categoria) {
  const item = getItemById(itemId, categoria);
  if (item) {
    toggleFavorito(item, null, categoria);
    abrirModal(itemId, categoria);
  }
}

function showToast(msg) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function cambiarCategoria(cat) {
  categoriaActualGlobal = cat;
  document.querySelectorAll('.tab-btn-wrap').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.querySelectorAll('.tab-panel-wrap').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + cat).classList.add('active');
  renderListas(cat);
}

function renderListas(categoria) {
  const data = rankingsData[categoria];
  const container = document.getElementById('listas-' + categoria);
  listasGlobalesPorCategoria[categoria] = data.listas;
  let listasOrdenadas = [...data.listas].sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
  renderListaCards(container, listasOrdenadas, categoria);
  const filtroGenero = document.getElementById(categoria + '-genero');
  const filtroAnio = document.getElementById(categoria + '-anio');
  const filtroPais = document.getElementById(categoria + '-pais');
  if (filtroGenero) filtroGenero.onchange = () => aplicarFiltros(categoria);
  if (filtroAnio) filtroAnio.onchange = () => aplicarFiltros(categoria);
  if (filtroPais) filtroPais.onchange = () => aplicarFiltros(categoria);
}

function aplicarFiltros(categoria) {
  const filtroGenero = document.getElementById(categoria + '-genero');
  const filtroAnio = document.getElementById(categoria + '-anio');
  const filtroPais = document.getElementById(categoria + '-pais');
  const genero = filtroGenero ? filtroGenero.value : 'todos';
  const año = filtroAnio ? filtroAnio.value : 'todos';
  const pais = filtroPais ? filtroPais.value : 'todos';
  let filtradas = listasGlobalesPorCategoria[categoria].filter(lista => {
    return (genero === 'todos' || lista.genero === genero) && (año === 'todos' || lista.año === parseInt(año)) && (pais === 'todos' || lista.pais === pais);
  });
  filtradas.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
  const container = document.getElementById('listas-' + categoria);
  renderListaCards(container, filtradas, categoria);
}

function renderListaCards(container, listas, categoria) {
  if (listas.length === 0) {
    container.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>No hay rankings</p></div>';
    return;
  }
  container.innerHTML = listas.map(lista => '<div class="lista-card" onclick="verLista(\'' + categoria + '\', \'' + lista.id + '\')"><img class="lista-imagen" src="' + lista.imagen + '"><div class="lista-contenido"><div class="lista-titulo">' + lista.titulo + '</div><div class="lista-desc">' + lista.descripcion + '</div><div class="lista-meta"><span><i class="fas fa-calendar"></i> ' + lista.año + '</span><span><i class="fas fa-globe"></i> ' + lista.pais + '</span><span><i class="fas fa-film"></i> ' + lista.genero + '</span></div></div></div>').join('');
}

function verLista(categoria, listaId) {
  const data = rankingsData[categoria];
  const lista = data.listas.find(l => l.id === listaId);
  const items = rankingsData[categoria].items[listaId];
  if (!lista || !items) return;
  document.querySelector('#panel-' + categoria + ' .vista-listas').style.display = 'none';
  document.querySelector('#panel-' + categoria + ' .vista-items').style.display = 'block';
  document.getElementById('titulo-' + categoria).textContent = lista.titulo;
  renderItems(categoria, items);
}

function volver(categoria) {
  document.querySelector('#panel-' + categoria + ' .vista-listas').style.display = 'block';
  document.querySelector('#panel-' + categoria + ' .vista-items').style.display = 'none';
}

function renderItems(categoria, items) {
  const container = document.getElementById('items-' + categoria);
  container.innerHTML = items.map(item => {
    const posClass = item.posicion === 1 ? 'top1' : item.posicion === 2 ? 'top2' : item.posicion === 3 ? 'top3' : '';
    const scoreClass = item.score >= 0 ? 'positivo' : 'negativo';
    const scorePercent = Math.min(Math.abs(item.score), 100);
    return '<div class="item-card" data-item-id="' + item.id + '" data-categoria="' + categoria + '"><div class="item-imagen"><img src="' + item.imagen + '" style="width:100%;height:100%;object-fit:cover;"><div class="item-posicion ' + posClass + '">' + item.posicion + '</div><div class="item-image-buttons"><button class="img-btn ' + (esFavorito(item.id) ? 'fav-active' : '') + '" onclick="event.stopPropagation(); toggleFavoritoById(\'' + item.id + '\', \'' + categoria + '\', this)"><i class="' + (esFavorito(item.id) ? 'fas' : 'far') + ' fa-heart"></i></button><button class="img-btn share-btn" onclick="event.stopPropagation(); compartirItemById(\'' + item.id + '\', \'' + categoria + '\')"><i class="fas fa-share"></i></button></div></div><div class="item-contenido"><div class="item-titulo" onclick="abrirModal(\'' + item.id + '\', \'' + categoria + '\')">' + item.titulo + '</div><div class="item-desc">' + item.descripcion + '</div><div class="item-score-container"><span class="item-score-label"><i class="fas fa-star"></i> Puntuación</span><span class="item-score-value ' + scoreClass + '">' + item.score + '</span><span class="item-score-max">/100</span><div class="item-score-bar"><div class="item-score-bar-fill ' + scoreClass + '" style="width: ' + scorePercent + '%"></div></div></div><div class="item-actions"><button class="btn-eye" onclick="event.stopPropagation(); abrirModal(\'' + item.id + '\', \'' + categoria + '\')"><i class="fas fa-eye"></i> Ver ficha</button></div></div></div>';
  }).join('');
  container.querySelectorAll('.item-card').forEach(card => {
    card.addEventListener('click', function(e) {
      if (!e.target.closest('button') && !e.target.closest('.item-titulo')) {
        abrirModal(this.dataset.itemId, this.dataset.categoria);
      }
    });
  });
}

function toggleFavoritoById(itemId, categoria, btn) {
  const item = getItemById(itemId, categoria);
  if (item) toggleFavorito(item, btn, categoria);
}

function compartirItemById(itemId, categoria) {
  const item = getItemById(itemId, categoria);
  if (item) compartirItem(item);
}

function abrirFavoritoPorIndex(index) {
  const item = favoritos[index];
  if (item) abrirModalDesdeFavorito(item);
}

function toggleFavoritoByIndex(index, btn) {
  const item = favoritos[index];
  if (item) {
    const categoria = item.categoria || categoriaActualGlobal;
    toggleFavorito(item, btn, categoria);
    renderFavoritos();
  }
}

function renderFavoritos() {
  const container = document.getElementById('favoritos-container');
  
  if (favoritos.length === 0) {
    container.innerHTML = '<div class="empty-state"><i class="fas fa-heart"></i><p>No tienes favoritos guardados</p></div>';
    return;
  }
  
  const favoritosPorCategoria = {};
  favoritos.forEach((item, index) => {
    const cat = item.categoria || 'unknown';
    if (!favoritosPorCategoria[cat]) {
      favoritosPorCategoria[cat] = [];
    }
    favoritosPorCategoria[cat].push({ ...item, favIndex: index });
  });
  
  const ordenCategorias = ['cine', 'libros', 'games', 'tecnologia', 'deportes', 'terror'];
  
  let html = '';
  
  ordenCategorias.forEach(cat => {
    if (favoritosPorCategoria[cat] && favoritosPorCategoria[cat].length > 0) {
      const icono = categoriaIconos[cat] || 'fa-star';
      const nombre = categoriaNombres[cat] || cat;
      
      html += '<div class="fav-category-section">';
      html += '<div class="fav-category-title"><i class="fas ' + icono + '"></i> ' + nombre + ' (' + favoritosPorCategoria[cat].length + ')</div>';
      html += '<div class="items-grid">';
      
      favoritosPorCategoria[cat].forEach(item => {
        const scoreClass = item.score >= 0 ? 'positivo' : 'negativo';
        const scorePercent = Math.min(Math.abs(item.score), 100);
        
        html += '<div class="item-card" data-fav-index="' + item.favIndex + '">';
        html += '<div class="item-imagen"><img src="' + item.imagen + '" style="width:100%;height:100%;object-fit:cover;">';
        html += '<div class="item-image-buttons"><button class="img-btn fav-active" onclick="event.stopPropagation(); toggleFavoritoByIndex(' + item.favIndex + ', this)"><i class="fas fa-heart"></i></button></div></div>';
        html += '<div class="item-contenido"><div class="item-titulo" onclick="abrirFavoritoPorIndex(' + item.favIndex + ')">' + item.titulo + '</div>';
        html += '<div class="item-desc">' + item.descripcion + '</div>';
        html += '<div class="item-score-container"><span class="item-score-label"><i class="fas fa-star"></i> Puntuación</span>';
        html += '<span class="item-score-value ' + scoreClass + '">' + item.score + '</span><span class="item-score-max">/100</span>';
        html += '<div class="item-score-bar"><div class="item-score-bar-fill ' + scoreClass + '" style="width: ' + scorePercent + '%"></div></div></div></div></div>';
      });
      
      html += '</div></div>';
    }
  });
  
  container.innerHTML = html;
  
  container.querySelectorAll('.item-card').forEach(card => {
    card.addEventListener('click', function(e) {
      if (!e.target.closest('button') && !e.target.closest('.item-titulo')) {
        const index = this.dataset.favIndex;
        abrirFavoritoPorIndex(index);
      }
    });
  });
}

function mostrarFavoritos() {
  document.querySelectorAll('.tab-btn-wrap').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel-wrap').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-favoritos').classList.add('active');
  renderFavoritos();
}

function navegarA(seccion, btn) {
  document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
  btn.classList.add('active');
  if (seccion === 'inicio') { cambiarCategoria('cine'); showToast('Inicio'); }
  else if (seccion === 'noticias') { showToast('Próximamente'); }
  else if (seccion === 'perfil') { showToast('Próximamente'); }
  else if (seccion === 'ajustes') { showToast('Próximamente'); }
}

document.addEventListener('DOMContentLoaded', function() {
  actualizarContador();
  renderListas('cine');
  
  const carousel = document.getElementById('navCarousel');
  let isDown = false, startX, scrollLeft;
  carousel.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - carousel.offsetLeft; scrollLeft = carousel.scrollLeft; });
  carousel.addEventListener('mouseleave', () => { isDown = false; });
  carousel.addEventListener('mouseup', () => { isDown = false; });
  carousel.addEventListener('mousemove', (e) => { if (!isDown) return; e.preventDefault(); const x = e.pageX - carousel.offsetLeft; carousel.scrollLeft = scrollLeft - (x - startX) * 2; });
});

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') cerrarModal(); });
document.getElementById('detailModal').addEventListener('click', function(e) { if (e.target === this) cerrarModal(); });
</script>

</body>
